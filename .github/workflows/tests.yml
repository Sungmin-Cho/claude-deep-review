name: Tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'hooks/scripts/**'
      - 'hooks/hooks.json'
      - 'commands/**'
      - 'skills/**'
      - 'agents/**'
      - '.claude-plugin/**'
      - '.codex-plugin/**'
      - 'tests/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/tests.yml'

permissions:
  contents: read

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: tests (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show bash version (M5.5 #4 — bash 3.2 visibility)
        run: bash --version

      - name: Run envelope tests
        run: npm test

      - name: Run mutation-protocol bash regression (M5.5 #5 + stat cross-platform fix)
        run: bash hooks/scripts/test/test-mutation-protocol.sh

      - name: Run sensitive-patterns library tests
        run: bash hooks/scripts/test/test-sensitive-patterns-lib.sh

      - name: detect-environment smoke test
        run: bash hooks/scripts/test/test-detect-environment.sh

      - name: run-agy-reviewer bridge test
        run: bash hooks/scripts/test/test-run-agy-reviewer.sh

      - name: ultracode/codex flags structural test
        run: bash hooks/scripts/test/test-ultracode-flags.sh
